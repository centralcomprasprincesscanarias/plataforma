<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Compras · Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f0d0a;
      --card:#1a1610;
      --card2:#221e18;
      --gold:#c9a84c;
      --gold2:#e8c97a;
      --text:#f0ece4;
      --sub:#9a8e7a;
      --border:rgba(176,141,87,0.18);
      --red:#e05252;
      --green:#52c07a;
      --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(176,141,87,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(176,141,87,0.05) 0%, transparent 60%);
    }
    .card{
      width:100%;
      max-width:480px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:28px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }
    .eyebrow{
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:11px;
      font-weight:700;
      margin-bottom:10px;
    }
    h1{
      margin:0 0 8px 0;
      font-size:28px;
      color:var(--gold2);
    }
    .sub{
      color:var(--sub);
      font-size:14px;
      line-height:1.5;
      margin-bottom:20px;
    }
    label{
      display:block;
      font-size:12px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.05em;
      margin-bottom:8px;
      font-weight:700;
    }
    input{
      width:100%;
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      color:var(--text);
      padding:14px 16px;
      font-size:15px;
      outline:none;
    }
    input:focus{border-color:var(--gold)}
    .row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
    button, .linkbtn{
      flex:1;
      min-width:160px;
      border:none;
      border-radius:12px;
      padding:14px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      text-align:center;
    }
    .primary{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#1a1610;
    }
    .secondary{
      background:transparent;
      color:var(--gold2);
      border:1px solid var(--border);
    }
    .msg{
      margin-top:14px;
      min-height:20px;
      font-size:13px;
      color:var(--red);
      font-weight:600;
    }
    .tip{
      margin-top:16px;
      padding:12px 14px;
      background:rgba(201,168,76,.07);
      border:1px solid rgba(201,168,76,.14);
      border-radius:12px;
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow">Acceso restringido</div>
      <h1>Central de Compras</h1>
      <div class="sub">
        Esta pantalla es solo para el departamento de compras. Los hoteles deben entrar por la pantalla de incidencias de hotel.
      </div>

      <label for="clave">Contraseña</label>
      <input id="clave" type="password" placeholder="Introduce la contraseña" autocomplete="current-password">

      <div class="row">
        <button class="primary" onclick="entrar()">Entrar</button>
        <a class="linkbtn secondary" href="incidencias_hotel.html">Ir a Hoteles</a>
      </div>

      <div class="msg" id="msg"></div>

      <div class="tip">
        Cambia la contraseña dentro del archivo en la constante <strong>PASSWORD</strong>.
      </div>
    </div>
  </div>

  <script>
    // Cambia esta contraseña por la tuya
    const PASSWORD = "Princess2026";
    const DESTINO = "incidencias_central_compras.html";

    function entrar() {
      const val = document.getElementById("clave").value;
      const msg = document.getElementById("msg");
      if (val === PASSWORD) {
        sessionStorage.setItem("central_compras_ok", "1");
        window.location.href = DESTINO;
      } else {
        msg.textContent = "Contraseña incorrecta.";
      }
    }

    document.getElementById("clave").addEventListener("keydown", function(e){
      if (e.key === "Enter") entrar();
    });
  </script>
</body>
</html>
